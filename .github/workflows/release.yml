name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'LXMonitor v__VERSION__'
          releaseBody: |
            ## LXMonitor v__VERSION__

            ### Downloads
            - **macOS (Apple Silicon)** — `.dmg` file (aarch64)
            - **macOS (Intel)** — `.dmg` file (x86_64)
            - **Windows** — `.msi` installer or `.exe`

            ### Changes in v0.1.1
            - Fixed event listener stability (listeners no longer re-register on source selection)
            - Fixed sACN performance (removed debug logging from hot path)
            - Fixed heatmap accuracy (stale closure in DMX data comparison)
            - Improved latency tracking performance (O(1) interval pruning)
            - Removed unused dependencies and dead code

            See [CHANGELOG.md](https://github.com/kaelenfae/LXMonitor/blob/master/CHANGELOG.md) for full details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
